# LeRobot V3 Loader Configuration
# This configuration file defines how to load LeRobot v3.0 datasets for training

# ========================================
# Dataset Configuration
# ========================================
dataset:
  # Repository ID (name of the dataset)
  repo_id: "fr3_solid_transfer_1_step_2_skip_abs_jps"

  # Root directory where datasets are stored
  # Use null for default: ~/.cache/huggingface/lerobot
  root_path: "../assets"

  # Episode filtering
  # - null: load all episodes
  # - [0, 1, 2, ...]: load only specified episode indices
  episodes: null

  # Git revision (branch/tag/commit)
  # Use null for latest version
  revision: null

  # Force re-download from hub even if cached
  force_cache_sync: false

  # Download video files (set false if using inline images only)
  download_videos: false

  # Video decoder backend: "pyav", "torchcodec", "video_reader"
  # Only needed if dataset uses video format
  video_backend: "pyav"

# ========================================
# Delta Timestamps Configuration
# ========================================
# Query historical/future frames for temporal context
# Format: {feature_key: [offset_in_seconds, ...]}
# Example: actions at t-0.1s, t, t+0.1s for 15 FPS → [-0.066, 0.0, 0.066]
delta_timestamps:
  # Action sequences (e.g., for action chunking)
  actions: [0.0, 0.066, 0.133]  # Current + 2 future frames at 15 FPS

  # State observations (typically only current state)
  # observations.state: [0.0]

  # Image observations (can query past/future if needed)
  # observations.images.ee_cam_1_color: [0.0]

  # Set to null to disable delta timestamps
  # delta_timestamps: null

# Timestamp synchronization tolerance (in seconds)
tolerance_s: 0.0001

# ========================================
# Data Preprocessing Configuration
# ========================================
preprocessing:
  # Normalize states and actions using dataset statistics
  normalize: true

  # Image transforms
  image_transforms:
    enabled: true

    # Resize images (null to disable)
    resize:
      height: 224
      width: 224

    # Normalize images with ImageNet statistics
    normalize:
      enabled: true
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

    # Additional augmentations (for training only)
    augmentation:
      enabled: false

      # Random color jitter
      color_jitter:
        brightness: 0.2
        contrast: 0.2
        saturation: 0.2
        hue: 0.1

      # Random crop and resize
      random_resized_crop:
        scale: [0.8, 1.0]
        ratio: [0.9, 1.1]

# ========================================
# DataLoader Configuration
# ========================================
dataloader:
  # Batch size
  batch_size: 32

  # Number of worker processes for data loading
  # - 0: single-process loading (no parallelism)
  # - 4-8: recommended for most setups
  # - 16+: for high-throughput training with fast GPUs
  num_workers: 8

  # Shuffle data (typically true for training, false for eval)
  shuffle: true

  # Pin memory for faster GPU transfer
  pin_memory: true

  # Drop last incomplete batch
  drop_last: true

  # Prefetch factor (samples per worker)
  prefetch_factor: 2

  # Keep workers alive between epochs
  persistent_workers: true

# ========================================
# Output Format Configuration
# ========================================
output:
  # Output format: "learning_factory" or "flat"
  #
  # "learning_factory": Nested dict with observations/actions structure
  #   {
  #     "observations": {
  #       "images": {"ee_cam_1_color": Tensor, ...},
  #       "state": Tensor
  #     },
  #     "actions": Tensor,
  #     "task": str,
  #     ...
  #   }
  #
  # "flat": Flat dict (compatible with original LeRobotDataset)
  #   {
  #     "ee_cam_1_color": Tensor,
  #     "state": Tensor,
  #     "actions": Tensor,
  #     ...
  #   }
  format: "learning_factory"

# ========================================
# Multi-Dataset Configuration
# ========================================
# Use this section when training on multiple datasets
multi_dataset:
  enabled: false

  # List of dataset repository IDs
  repo_ids:
    - "fr3_solid_transfer_1_step_2_skip_abs_jps"
    - "fr3_pick_and_place"

  # Per-dataset episode filtering
  # Use null for all episodes
  episodes:
    fr3_solid_transfer_1_step_2_skip_abs_jps: null
    fr3_pick_and_place: [0, 1, 2, 3, 4]

  # Per-dataset timestamp tolerance
  tolerances_s:
    fr3_solid_transfer_1_step_2_skip_abs_jps: 0.0001
    fr3_pick_and_place: 0.0001

# ========================================
# Training-Specific Configuration
# ========================================
training:
  # Random seed for reproducibility
  seed: 42

  # Device
  device: "cuda"

  # Mixed precision training
  mixed_precision: true

  # Gradient accumulation steps
  gradient_accumulation_steps: 1

# ========================================
# Logging and Debugging
# ========================================
logging:
  # Log dataset statistics at startup
  log_stats: true

  # Log sample batch shapes
  log_sample_shapes: true

  # Verbose mode
  verbose: false
