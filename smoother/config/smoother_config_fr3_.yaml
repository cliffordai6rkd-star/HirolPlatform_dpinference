# Smoother Configuration
# This file configures the joint command smoothing functionality

# Basic Critical Damped Smoother (针对Monte01双臂优化)
# critical_damped:
#   type: "critical_damped"
#   omega_n: 20.0           # 降低自然频率，提供更平滑的响应 (减少卡顿)
#                           # 15-20: 软/柔顺，较慢响应 (适合精确操作)
#                           # 20-30: 平衡 (默认25)
#                           # 30-40: 快速响应，更硬
#   zeta: 1.0              # 阻尼比 (1.0 = 临界阻尼，无超调)
#   control_frequency: 800  # 内部控制循环频率 (Hz) - 匹配异步控制

# # Adaptive Critical Damped Smoother (adjusts response based on error)
# adaptive_critical_damped:
#   type: "adaptive_critical_damped"
  
#   # Base parameters
#   omega_n: 25.0           # Default natural frequency
#   zeta: 1.0              # Critical damping
#   control_frequency: 400  # Internal frequency (Hz)
  
#   # Adaptive parameters
#   omega_n_min: 15.0      # Minimum omega_n (soft mode for small errors)
#   omega_n_max: 40.0      # Maximum omega_n (fast mode for large errors)
  
#   error_thresholds:
#     low: 0.01            # Error below this = soft mode (rad, ~0.57°)
#     high: 0.1            # Error above this = fast mode (rad, ~5.7°)
  
#   transition: "sigmoid"   # Transition type: "linear" or "sigmoid"
#   omega_change_limit: 5.0 # Max omega_n change per update (rad/s)

# Ruckig Smoother (S-curve with jerk limiting) - 针对xArm7优化
ruckig:
  type: "ruckig"
  control_frequency: 100  # 匹配异步控制频率，提高平滑度
  
  # xArm7关节工作范围 (根据官方规格)
  min_position: [-6.2832, -2.0595, -6.2832, -0.1920, -6.2832, -1.6930, -6.2832]  # rad
  max_position: [ 6.2832,  2.0944,  6.2832,  3.9270,  6.2832,  3.1416,  6.2832]  # rad
  
  # xArm7性能参数 (根据官方规格，适当保守设置)
  max_velocity: [2.5, 2.5, 2.5, 2.5, 2.5, 2.5, 2.5]           # rad/s (约143°/s，低于180°/s上限)
  max_acceleration: [15.0, 15.0, 15.0, 15.0, 15.0, 15.0, 15.0] # rad/s² (保守设置，低于20.0)
  max_jerk: [300.0, 300.0, 300.0, 300.0, 300.0, 300.0, 300.0] # rad/s³ (保守设置，减少卡顿)
  
  synchronization: true   # 启用同步，确保协调运动
  sync_mode: "phase"     # 使用phase同步模式，提供最平滑的协调运动
                          # - "phase": 同步速度曲线 (最平滑的协调运动)
                          # - "time": 所有关节同时完成 (可能导致突然启动/停止)
                          # - "none": 每个关节独立优化 (最快但可能不协调)

# Usage Examples in motion_config.yaml:
# 
# motion_factory:
#   use_smoother: true
#   smoother_config:
#     type: "adaptive_critical_damped"  # or "critical_damped"
#     omega_n: 25.0
#     omega_n_min: 15.0
#     omega_n_max: 40.0
#     error_thresholds:
#       low: 0.01
#       high: 0.1
#     transition: "sigmoid"