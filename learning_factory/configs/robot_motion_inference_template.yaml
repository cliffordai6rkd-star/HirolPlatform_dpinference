# LeRobot 推理配置模板
# 将此文件复制到项目或个人目录，替换占位符后通过
#   python -m learning_factory.scripts.lerobot_inference --config <path>
# 启动在线推理。

robot_motion_config: factory/tasks/config/robot_motion_fr3_cfg.yaml

dataset:
  repo_id: fr3_pick_and_place_3dmouse
  root: /PATH/TO/dataset/assets/fr3_pick_and_place_3dmouse
  # 下列字段可选，仅当需要覆盖数据集默认值时填写
  # action_type: command_end_effector_pose_delta
  # observation_type: mask
  # observation_orientation: euler

policy:
  path: /PATH/TO/outputs/train/.../pretrained_model

device: cuda          # 或 cpu
enable_hardware: true # 仿真环境可设为 false

gripper:
  max_position: 0.08  # 夹爪最大行程（米）

# 顶层参数会覆盖 dataset.* 中的同名字段
action_type: command_end_effector_pose_delta
action_orientation: quaternion
observation_orientation: euler

max_episodes: 5
episode_timeout_s: 120

# 可选：给策略的自然语言任务描述
task: pick up the rice and place it into the bowl
