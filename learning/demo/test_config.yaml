action_aggregation:
  enabled: true
  method: ema
  window_size: 3
control_frequency: 20.0
gripper_postprocess:
  close_action_threshold: 0.065
  closing_trend_threshold: -0.001
  max_safety_failures: 5
  min_holding_steps: 30
  open_action_threshold: 0.07
  opening_trend_threshold: 0.001
  safety_reopen_enabled: true
  trend_window_size: 5
max_episode_length: 100
sliding_window_size: 10
