# ACT推理配置文件
# 用于配置Action Chunking with Transformers模型的推理参数

# 基本配置
algorithm: "ACT"
checkpoint_dir: "learning/ckpts/policy_best.ckpt"  # 需要根据实际路径修改

# 推理配置
inference_config:
  # 机器人状态配置
  state_dim: 7  # 机器人关节维度 (FR3: 7, Monte01: 7)
  
  # 相机配置
  camera_names:
    - "front_camera"
    - "wrist_camera"
  
  # ACT模型参数
  lr: 1e-5
  num_queries: 100  # action chunk size
  kl_weight: 10
  hidden_dim: 512
  dim_feedforward: 3200
  lr_backbone: 1e-5
  backbone: "resnet18"
  enc_layers: 4
  dec_layers: 7
  nheads: 8
  
  # VQ参数 (可选)
  vq: false
  vq_class: null
  vq_dim: null
  
  # 编码器配置
  no_encoder: false

# 推理运行时配置
runtime:
  # 设备配置
  device: "auto"  # auto, cuda, cpu
  
  # 图像预处理
  image_preprocessing:
    target_size: [480, 640]  # [height, width]
    normalize: true
    
  # 安全检查
  safety_validation: true
  
  # 性能配置
  max_batch_size: 1
  inference_timeout: 1.0  # 推理超时时间(秒)
  
  # 重试配置
  max_retries: 3
  retry_delay: 0.1  # 重试间隔(秒)

# 数据适配器配置
data_adapter:
  robot_type: "fr3"  # fr3, monte01, generic
  validation_enabled: true
  
  # 数据格式配置
  joint_position_range: [-3.14, 3.14]  # 关节位置范围检查
  image_channels: 3  # RGB通道数
  
  # 数据转换配置
  position_scaling: 1.0
  action_scaling: 1.0

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_inference_time: true
  log_data_validation: false
  log_action_commands: false